<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Moderation API</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .navbar {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
        }
        .navbar-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #7c6cf0;
        }
        .navbar-brand i { margin-right: 8px; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            color: #a0a0c0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #7c6cf0; }

        .container { max-width: 720px; margin: 0 auto; padding: 2rem; }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: #c0c0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 i { color: #7c6cf0; }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #7c6cf0; }

        button {
            background: #7c6cf0;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 1rem;
            width: 100%;
        }
        button:hover { background: #6a5ce0; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-box {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }
        .result-box.show { display: block; }
        .result-box.threat { background: #2a1010; border: 1px solid #5a2020; }
        .result-box.safe { background: #102a10; border: 1px solid #205a20; }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-threat { background: #5a2020; color: #ff6b6b; }
        .badge-safe { background: #205a20; color: #6bff6b; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-item {
            background: #0f0f1a;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .value { font-size: 1.5rem; font-weight: 700; color: #7c6cf0; }
        .stat-item .label { font-size: 0.8rem; color: #8080a0; margin-top: 4px; }

        .highlight-red { color: #ff6b6b; font-weight: 600; }
        .highlight-green { color: #6bff6b; font-weight: 600; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .card { padding: 1.25rem; }
            .stat-grid { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><i class="fas fa-shield-halved"></i> Content Moderation</div>
        <div class="nav-links">
            <a href="#classify"><i class="fas fa-search"></i> Classify</a>
            <a href="#info"><i class="fas fa-chart-simple"></i> Info</a>
        </div>
    </nav>

    <div class="container">
        <div id="classify" class="card">
            <h2><i class="fas fa-microphone"></i> Classify Text</h2>
            <textarea id="inputText" placeholder="Enter text to analyze..."></textarea>
            <button id="classifyBtn" onclick="classify()"><i class="fas fa-shield"></i> Analyze</button>
            <div id="result" class="result-box"></div>
        </div>

        <div id="info" class="card">
            <h2><i class="fas fa-chart-simple"></i> Model Info</h2>
            <p style="color: #8080a0; font-size: 0.9rem;">Pre-trained Logistic Regression with TF-IDF vectorization. Detects hate speech, offensive language, and neutral content.</p>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="value" id="precision">0.00</div>
                    <div class="label">Precision</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="recall">0.00</div>
                    <div class="label">Recall</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="f1">0.00</div>
                    <div class="label">F1 Score</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function classify() {
            const text = document.getElementById('inputText').value.trim();
            const btn = document.getElementById('classifyBtn');
            const result = document.getElementById('result');

            if (!text) { result.className = 'result-box show safe'; result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter text.'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';

            try {
                const res = await fetch('/api/v1/moderate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();

                const isThreat = data.is_threat;
                result.className = `result-box show ${isThreat ? 'threat' : 'safe'}`;
                result.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                        <span class="badge ${isThreat ? 'badge-threat' : 'badge-safe'}">
                            ${isThreat ? '<i class="fas fa-exclamation-triangle"></i> Threat' : '<i class="fas fa-check-circle"></i> Safe'}
                        </span>
                        <span style="color: #8080a0; font-size: 0.85rem;">${(data.confidence * 100).toFixed(1)}% confidence</span>
                    </div>
                    <div style="font-size: 0.9rem; color: #a0a0c0;">
                        Label: <strong>${data.label}</strong>
                    </div>
                `;
            } catch (err) {
                result.className = 'result-box show threat';
                result.innerHTML = '<i class="fas fa-times-circle"></i> Error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-shield"></i> Analyze';
            }
        }
    </script>
</body>
</html>
